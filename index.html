<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コトリ洋菓子店 | Kotori Patisserie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ヘッダー -->
    <header id="header" class="site-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-en">Kotori</span>
                <span class="logo-ja">コトリ洋菓子店</span>
            </div>
            <nav class="nav">
                <a href="#concept">コンセプト</a>
                <a href="#products">商品一覧</a>
                <a href="#order">ご注文</a>
            </nav>
        </div>
    </header>

    <!-- ヒーローセクション -->
    <section class="hero">
        <div class="hero-content">
            <p class="hero-sub">小さな幸せを、ひとつひとつ丁寧に。</p>
            <h1 class="hero-title">Kotori<br><span>コトリ洋菓子店</span></h1>
            <a href="#products" class="btn-hero">商品を見る</a>
        </div>
    </section>

    <!-- 商品一覧 -->
    <section id="products" class="products">
        <h2 class="section-title">商品一覧</h2>
        <div class="products-grid">
            <!-- カード1 -->
            <div class="product-card fade-up">
                <img src="muffin.jpg" alt="マフィン">
                <div class="product-body">
                    <h3>バタークリームマフィン</h3>
                    <p>口どけの良いバタークリームを贅沢に使用しました。</p>
                    <span class="price">¥450</span>
                </div>
            </div>
            <!-- 他の商品も同様に続く -->
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
