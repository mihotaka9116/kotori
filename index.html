<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kotori – コトリ洋菓子店</title>
  <!-- Tailwind CSS CDN (v3系を使用することで動作を安定させます) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <script>
    // Tailwindのカスタム設定を適用
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#faf7f2',
            warm: '#f5ede0',
            caramel: '#c8976a',
            brown: '#7a4f2d',
            dark: '#2c1a0e',
            gray: '#9b8b7d',
          },
          fontFamily: {
            en: ['"Cormorant Garamond"', 'serif'],
            ja: ['"Noto Serif JP"', 'serif'],
          },
          borderRadius: {
            'custom': '12px',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-cream text-dark font-ja">

  <!-- ヘッダー -->
  <header class="site-header" id="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-en">Kotori</span>
        <span class="logo-ja">コトリ洋菓子店</span>
      </div>
      <nav class="nav">
        <a href="#concept">コンセプト</a>
        <a href="#news">お知らせ</a>
        <a href="#products">商品一覧</a>
        <a href="#info">アクセス</a>
        <a href="#order" class="nav-cta text-white px-6 py-2 bg-caramel rounded-full">ご注文</a>
      </nav>
      <!-- スマホ用ハンバーガー -->
      <div class="md:hidden flex flex-col gap-1.5 w-8 items-end" id="navToggle">
        <span class="block w-full h-[1px] bg-brown"></span>
        <span class="block w-3/4 h-[1px] bg-brown"></span>
        <span class="block w-1/2 h-[1px] bg-brown"></span>
      </div>
    </div>
  </header>

  <main>
    <!-- HERO (フルスクリーン) -->
    <section class="relative h-screen flex items-center justify-center overflow-hidden bg-warm">
      <div class="hero-bg absolute inset-0 opacity-30"></div>
      <div class="relative z-10 text-center px-6">
        <p class="font-ja text-caramel tracking-[0.3em] mb-4">小さな幸せを、ひとつひとつ丁寧に。</p>
        <h1 class="font-en text-7xl md:text-9xl text-brown leading-none">Kotori</h1>
        <p class="font-ja text-xl text-caramel tracking-[0.4em] mt-2">コトリ洋菓子店</p>
        <a href="#products" class="btn-hero inline-block mt-10 px-10 py-3 border border-caramel text-brown rounded-full hover:bg-caramel hover:text-white transition-all">商品を見る</a>
      </div>
    </section>

    <!-- 各セクションのコンテナを共通化 -->
    <section id="products" class="py-20 px-6 max-w-[1100px] mx-auto">
      <div class="text-center mb-12">
        <p class="font-en text-caramel tracking-widest">— Our Products —</p>
        <h2 class="text-3xl font-ja">商品一覧</h2>
      </div>
      <div id="products-list" class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- JSで挿入 -->
      </div>
    </section>

    <!-- INFO & CALENDAR-->
    <section id="info" class="py-20 bg-warm px-6">
      <div class="max-w-[1100px] mx-auto grid grid-cols-1 md:grid-cols-2 gap-12 items-start">
        <div>
          <h2 class="text-3xl font-ja mb-8">店舗情報</h2>
          <table class="w-full text-left border-collapse">
            <tr class="border-b border-caramel/20"><th class="py-4 font-normal text-caramel w-32">住所</th><td class="py-4">岩手県遠野市...</td></tr>
            <tr class="border-b border-caramel/20"><th class="py-4 font-normal text-caramel">営業時間</th><td class="py-4">10:00 - 18:00</td></tr>
          </table>
        </div>
        <div class="bg-white p-8 rounded-custom shadow-lg">
          <div id="calendar-grid" class="grid grid-cols-7 gap-2">
            <!-- JSで挿入 -->
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
